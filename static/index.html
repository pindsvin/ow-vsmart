<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bblthk catalogus-assistent</title>
<style>
/* ── GT Walsheim ─────────────────────────────────────────── */
@font-face { font-family:"GT Walsheim"; src:url("fonts/GT-Walsheim-Regular.otf") format("opentype"); font-weight:400; font-style:normal; font-display:swap; }
@font-face { font-family:"GT Walsheim"; src:url("fonts/GT-Walsheim-Medium.otf")  format("opentype"); font-weight:500; font-style:normal; font-display:swap; }
@font-face { font-family:"GT Walsheim"; src:url("fonts/GT-Walsheim-Bold.otf")    format("opentype"); font-weight:700; font-style:normal; font-display:swap; }

/* ── Design tokens ───────────────────────────────────────── */
:root {
  --dept-color: #a790e6;
  --dept-tint:  #ede9f9;
  --text:       #1d1d1b;
  --text-muted: #8a8a88;
  --text-soft:  #5a5a58;
  --bg-chat:    #fafaf9;
  --border-1:   #f2f2f0;
  --border-2:   #e8e8e6;
  --available:   #53e09a;
  --unavailable: #ff838a;
  --card-shadow: 0 2px 14px rgba(29,29,27,0.07);
  --font: "GT Walsheim", system-ui, sans-serif;
}

/* ── Reset ───────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font);
  font-size: 14px;
  color: var(--text);
  background: #ffffff;
  -webkit-font-smoothing: antialiased;
}

#app {
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Header ──────────────────────────────────────────────── */
#header {
  flex-shrink: 0;
  background: #ffffff;
  border-bottom: 1px solid var(--border-1);
  padding: 20px 40px;
  position: relative;
  overflow: hidden;
}
#header .circle-lg,
#header .circle-sm {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  border-radius: 50%;
  background: var(--dept-color);
  pointer-events: none;
}
#header .circle-lg { right: -90px; width: 220px; height: 220px; opacity: 0.10; }
#header .circle-sm { right: -50px; width: 140px; height: 140px; opacity: 0.07; }
#header-inner {
  max-width: 860px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  position: relative;
  z-index: 1;
}
#header-left { display: flex; align-items: center; gap: 18px; }
#header-left img { height: 34px; display: block; }
#header-divider { width: 1px; height: 28px; background: var(--border-2); flex-shrink: 0; }
#header-title { font-size: 17px; font-weight: 700; color: var(--text); line-height: 1.2; }
#header-subtitle { font-size: 12px; color: var(--text-muted); margin-top: 2px; font-weight: 400; }
#header-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--dept-tint);
  color: var(--dept-color);
  font-size: 12px;
  font-weight: 700;
  padding: 6px 14px;
  border-radius: 999px;
  white-space: nowrap;
}
#header-badge::before {
  content: "";
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--dept-color);
}

/* ── Chat scroll area ────────────────────────────────────── */
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 32px 40px 16px;
  background: var(--bg-chat);
}
#chat-inner {
  max-width: 860px;
  margin: 0 auto;
}
#chat::-webkit-scrollbar { width: 4px; }
#chat::-webkit-scrollbar-track { background: transparent; }
#chat::-webkit-scrollbar-thumb { background: #c4c4c2; border-radius: 2px; }

/* ── Messages ────────────────────────────────────────────── */
.msg-wrap {
  display: flex;
  justify-content: flex-start;
  margin-bottom: 16px;
}
.msg-wrap.user { justify-content: flex-end; }

.msg-card {
  max-width: 78%;
  background: #ffffff;
  border-top: 4px solid var(--dept-color);
  border-radius: 12px;
  box-shadow: var(--card-shadow);
  padding: 18px 22px;
  font-size: 14px;
  line-height: 1.7;
  color: var(--text);
  white-space: pre-wrap;
  word-break: break-word;
}
.msg-card.user {
  max-width: 68%;
  background: var(--dept-tint);
  border-top: none;
  box-shadow: none;
  border-radius: 12px;
  padding: 14px 18px;
}

/* ── Source cards ────────────────────────────────────────── */
.sources {
  margin-top: 14px;
  padding-top: 12px;
  border-top: 1px solid var(--border-1);
}
.sources-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 10px;
}
.source-cards {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.source-card {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  background: var(--bg-chat);
  border-top: 4px solid var(--available);
  border-radius: 8px;
  padding: 10px 12px;
  min-width: 130px;
  max-width: 185px;
  box-shadow: 0 2px 8px rgba(29,29,27,0.05);
}
.source-card.unavailable { border-top-color: var(--unavailable); }
.source-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 5px;
  background: var(--available);
}
.source-dot.unavailable { background: var(--unavailable); }
.source-title { font-size: 12px; font-weight: 700; color: var(--text); line-height: 1.3; }
.source-byline { font-size: 11px; color: var(--text-soft); margin-top: 3px; font-weight: 400; }

/* ── Typing indicator ────────────────────────────────────── */
#typing { display: none; }
#typing.visible { display: flex; }
.typing-dots {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 16px 22px;
}
.typing-dots span {
  display: inline-block;
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--dept-color);
  animation: typingDot 1.2s infinite ease;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }

/* ── Footer / input ──────────────────────────────────────── */
#footer {
  flex-shrink: 0;
  background: #ffffff;
  border-top: 1px solid var(--border-1);
  padding: 16px 40px 20px;
}
#footer-inner {
  max-width: 860px;
  margin: 0 auto;
}
#input-row {
  display: flex;
  align-items: center;
  gap: 14px;
}
#question {
  flex: 1;
  border: none;
  border-bottom: 2px solid var(--text);
  background: transparent;
  font-family: var(--font);
  font-size: 15px;
  font-weight: 400;
  padding: 10px 4px;
  outline: none;
  color: var(--text);
  transition: border-color 140ms ease;
}
#question::placeholder { color: var(--text-muted); }
#question:focus { border-bottom-color: var(--dept-color); }
#send {
  flex-shrink: 0;
  background: var(--dept-color);
  color: var(--text);
  font-family: var(--font);
  font-weight: 500;
  font-size: 14px;
  padding: 10px 28px;
  border: 0;
  border-radius: 999px;
  cursor: pointer;
  white-space: nowrap;
  transition: opacity 140ms ease, transform 150ms ease;
}
#send:hover:not(:disabled) { transform: translateY(-1px); }
#send:disabled { opacity: 0.5; cursor: not-allowed; }
#footer-hint { font-size: 11px; color: var(--text-muted); margin-top: 8px; font-weight: 400; }

/* ── Animations ──────────────────────────────────────────── */
@keyframes typingDot {
  0%, 80%, 100% { transform: scale(0.7); opacity: 0.35; }
  40%           { transform: scale(1);   opacity: 1; }
}
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div id="header">
    <div class="circle-lg"></div>
    <div class="circle-sm"></div>
    <div id="header-inner">
      <div id="header-left">
        <img src="logo-bblthk.svg" alt="de bblthk" height="34">
        <div id="header-divider"></div>
        <div>
          <div id="header-title">catalogus-assistent</div>
          <div id="header-subtitle">stel een vraag over de collectie in Wageningen</div>
        </div>
      </div>
      <div id="header-badge">bieb</div>
    </div>
  </div>

  <!-- CHAT -->
  <div id="chat">
    <div id="chat-inner">
      <!-- messages injected here -->
      <div id="typing" class="msg-wrap">
        <div class="msg-card">
          <div class="typing-dots">
            <span></span><span></span><span></span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <div id="footer">
    <div id="footer-inner">
      <div id="input-row">
        <input id="question" type="text"
          placeholder="Stel je vraag over de bblthk-collectie…"
          autocomplete="off">
        <button id="send">Verstuur</button>
      </div>
      <div id="footer-hint">Enter of klik Verstuur · resultaten uit de bblthk-collectie Wageningen</div>
    </div>
  </div>

</div>
<script>
function esc(t) {
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}

function createMessage(msg) {
  const isUser = msg.role === 'user';

  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap' + (isUser ? ' user' : '');

  const card = document.createElement('div');
  card.className = 'msg-card' + (isUser ? ' user' : '');

  const textEl = document.createElement('div');
  textEl.textContent = msg.text;
  card.appendChild(textEl);

  if (!isUser && msg.sources && msg.sources.length > 0) {
    const sources = document.createElement('div');
    sources.className = 'sources';

    const label = document.createElement('div');
    label.className = 'sources-label';
    label.textContent = 'Gevonden in de catalogus';
    sources.appendChild(label);

    const cards = document.createElement('div');
    cards.className = 'source-cards';

    msg.sources.forEach(s => {
      const sc = document.createElement('div');
      sc.className = 'source-card' + (s.available ? '' : ' unavailable');

      const dot = document.createElement('div');
      dot.className = 'source-dot' + (s.available ? '' : ' unavailable');
      sc.appendChild(dot);

      const info = document.createElement('div');
      const title = document.createElement('div');
      title.className = 'source-title';
      title.textContent = s.title;
      const byline = document.createElement('div');
      byline.className = 'source-byline';
      byline.textContent = (s.author || 'onbekend') + ' · ' + (s.available ? 'beschikbaar' : 'uitgeleend');
      info.appendChild(title);
      info.appendChild(byline);
      sc.appendChild(info);
      cards.appendChild(sc);
    });

    sources.appendChild(cards);
    card.appendChild(sources);
  }

  wrap.appendChild(card);
  return wrap;
}

function addMessage(msg) {
  const chatInner = document.getElementById('chat-inner');
  const typing    = document.getElementById('typing');
  const el        = createMessage(msg);
  chatInner.insertBefore(el, typing);
  scroll();
}

function scroll() {
  const chat = document.getElementById('chat');
  chat.scrollTop = chat.scrollHeight;
}

function setLoading(on) {
  document.getElementById('typing').className = 'msg-wrap' + (on ? ' visible' : '');
  document.getElementById('send').disabled = on;
  scroll();
}

async function sendMessage() {
  const input = document.getElementById('question');
  const q = input.value.trim();
  if (!q || document.getElementById('send').disabled) return;

  addMessage({ role: 'user', text: q });
  input.value = '';
  setLoading(true);

  try {
    const res  = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q })
    });
    const data = await res.json();
    addMessage({ role: 'assistant', text: data.answer || 'Geen antwoord ontvangen.', sources: data.sources || [] });
  } catch (e) {
    addMessage({ role: 'assistant', text: 'Sorry, ik kan de catalogus nu niet bereiken.\n\nIs de server actief? Start hem met:\npython3 chat_server.py', sources: [] });
  }
  setLoading(false);
}

// Init
document.getElementById('question').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendMessage();
});
document.getElementById('send').addEventListener('click', sendMessage);

addMessage({
  role: 'assistant',
  text: 'Hallo! Ik ben de bblthk catalogus-assistent.\n\nStel me een vraag over onze collectie — ik zoek voor je in de bibliotheek Wageningen en geef persoonlijk advies.',
  sources: []
});
</script>
</body>
</html>
