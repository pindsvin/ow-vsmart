<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bblthk catalogus-assistent</title>
<style>
/* ── GT Walsheim ─────────────────────────────────────────── */
@font-face { font-family:"GT Walsheim"; src:url("fonts/GT-Walsheim-Regular.otf") format("opentype"); font-weight:400; font-style:normal; font-display:swap; }
@font-face { font-family:"GT Walsheim"; src:url("fonts/GT-Walsheim-Medium.otf")  format("opentype"); font-weight:500; font-style:normal; font-display:swap; }
@font-face { font-family:"GT Walsheim"; src:url("fonts/GT-Walsheim-Bold.otf")    format("opentype"); font-weight:700; font-style:normal; font-display:swap; }

/* ── Design tokens ───────────────────────────────────────── */
:root {
  --dept-color: #a790e6;
  --dept-tint:  #ede9f9;
  --text:       #1d1d1b;
  --text-muted: #8a8a88;
  --text-soft:  #5a5a58;
  --bg-chat:    #fafaf9;
  --border-1:   #f2f2f0;
  --border-2:   #e8e8e6;
  --available:   #53e09a;
  --unavailable: #ff838a;
  --card-shadow: 0 2px 14px rgba(29,29,27,0.07);
  --font: "GT Walsheim", system-ui, sans-serif;
}

/* ── Reset ───────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font);
  font-size: 14px;
  color: var(--text);
  background: #ffffff;
  -webkit-font-smoothing: antialiased;
}

#app {
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Header ──────────────────────────────────────────────── */
#header {
  flex-shrink: 0;
  background: #ffffff;
  border-bottom: 1px solid var(--border-1);
  padding: 20px 40px;
  position: relative;
  overflow: hidden;
}
#header .circle-lg,
#header .circle-sm {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  border-radius: 50%;
  background: var(--dept-color);
  pointer-events: none;
}
#header .circle-lg { right: -90px; width: 220px; height: 220px; opacity: 0.10; }
#header .circle-sm { right: -50px; width: 140px; height: 140px; opacity: 0.07; }
#header-inner {
  max-width: 860px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  position: relative;
  z-index: 1;
}
#header-left { display: flex; align-items: center; gap: 18px; }
#header-left img { height: 34px; display: block; }
#header-divider { width: 1px; height: 28px; background: var(--border-2); flex-shrink: 0; }
#header-title { font-size: 17px; font-weight: 700; color: var(--text); line-height: 1.2; }
#header-subtitle { font-size: 12px; color: var(--text-muted); margin-top: 2px; font-weight: 400; }
#header-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--dept-tint);
  color: var(--dept-color);
  font-size: 12px;
  font-weight: 700;
  padding: 6px 14px;
  border-radius: 999px;
  white-space: nowrap;
}
#header-badge::before {
  content: "";
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--dept-color);
}

/* ── Stats strip ─────────────────────────────────────────── */
#stats {
  flex-shrink: 0;
  background: #ffffff;
  border-bottom: 1px solid var(--border-1);
  padding: 10px 40px 12px;
  display: none;
}
#stats.visible { display: block; }
#stats-inner {
  max-width: 860px;
  margin: 0 auto;
}
#stats-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 7px;
}
#stats-label strong { color: var(--text); font-weight: 700; }
#stats-themes {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}
.theme-pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: var(--bg-chat);
  border: 1px solid var(--border-2);
  border-radius: 999px;
  padding: 3px 10px;
  font-size: 11px;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
}
.theme-pill .count {
  font-weight: 700;
  color: var(--dept-color);
}

/* ── Chat scroll area ────────────────────────────────────── */
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 32px 40px 16px;
  background: var(--bg-chat);
}
#chat-inner {
  max-width: 860px;
  margin: 0 auto;
}
#chat::-webkit-scrollbar { width: 4px; }
#chat::-webkit-scrollbar-track { background: transparent; }
#chat::-webkit-scrollbar-thumb { background: #c4c4c2; border-radius: 2px; }

/* ── Messages ────────────────────────────────────────────── */
.msg-wrap {
  display: flex;
  justify-content: flex-start;
  margin-bottom: 16px;
}
.msg-wrap.user { justify-content: flex-end; }

.msg-card {
  max-width: 78%;
  background: #ffffff;
  border-top: 4px solid var(--dept-color);
  border-radius: 12px;
  box-shadow: var(--card-shadow);
  padding: 18px 22px;
  font-size: 14px;
  line-height: 1.7;
  color: var(--text);
  white-space: pre-wrap;
  word-break: break-word;
}
.msg-card.user {
  max-width: 68%;
  background: var(--dept-tint);
  border-top: none;
  box-shadow: none;
  border-radius: 12px;
  padding: 14px 18px;
}

/* ── Source cards ────────────────────────────────────────── */
.sources {
  margin-top: 14px;
  padding-top: 12px;
  border-top: 1px solid var(--border-1);
}
.sources-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 10px;
}
.source-cards {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.source-card {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  background: var(--bg-chat);
  border-top: 4px solid var(--available);
  border-radius: 8px;
  padding: 10px 12px;
  min-width: 130px;
  max-width: 185px;
  box-shadow: 0 2px 8px rgba(29,29,27,0.05);
}
.source-card.unavailable { border-top-color: var(--unavailable); }
.source-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 5px;
  background: var(--available);
}
.source-dot.unavailable { background: var(--unavailable); }
.source-title { font-size: 12px; font-weight: 700; color: var(--text); line-height: 1.3; }
.source-byline { font-size: 11px; color: var(--text-soft); margin-top: 3px; font-weight: 400; }

/* ── Typing indicator ────────────────────────────────────── */
#typing { display: none; }
#typing.visible { display: flex; }
.typing-dots {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 16px 22px;
}
.typing-dots span {
  display: inline-block;
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--dept-color);
  animation: typingDot 1.2s infinite ease;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }

/* ── Footer / input ──────────────────────────────────────── */
#footer {
  flex-shrink: 0;
  background: #ffffff;
  border-top: 1px solid var(--border-1);
  padding: 16px 40px 20px;
}
#footer-inner {
  max-width: 860px;
  margin: 0 auto;
}
#input-row {
  display: flex;
  align-items: center;
  gap: 14px;
}
#input-wrap {
  flex: 1;
  position: relative;
}
#question {
  width: 100%;
  border: none;
  border-bottom: 2px solid var(--text);
  background: transparent;
  font-family: var(--font);
  font-size: 15px;
  font-weight: 400;
  padding: 10px 4px;
  outline: none;
  color: var(--text);
  transition: border-color 140ms ease;
  position: relative;
  z-index: 1;
}
#ghost {
  position: absolute;
  inset: 0;
  padding: 10px 4px;
  font-family: var(--font);
  font-size: 15px;
  font-weight: 400;
  white-space: pre;
  overflow: hidden;
  pointer-events: none;
  z-index: 0;
}
#ghost .typed { color: transparent; }
#ghost .completion { color: #b8b8b6; }
#tab-hint {
  position: absolute;
  right: 4px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.05em;
  color: var(--text-muted);
  background: var(--bg-chat);
  border: 1px solid var(--border-2);
  border-radius: 5px;
  padding: 2px 7px;
  pointer-events: none;
  display: none;
  z-index: 2;
}
#tab-hint.visible { display: block; }
#question::placeholder { color: var(--text-muted); }
#question:focus { border-bottom-color: var(--dept-color); }
#send {
  flex-shrink: 0;
  background: var(--dept-color);
  color: var(--text);
  font-family: var(--font);
  font-weight: 500;
  font-size: 14px;
  padding: 10px 28px;
  border: 0;
  border-radius: 999px;
  cursor: pointer;
  white-space: nowrap;
  transition: opacity 140ms ease, transform 150ms ease;
}
#send:hover:not(:disabled) { transform: translateY(-1px); }
#send:disabled { opacity: 0.5; cursor: not-allowed; }
#footer-hint { font-size: 11px; color: var(--text-muted); margin-top: 8px; font-weight: 400; }

/* ── Animations ──────────────────────────────────────────── */
@keyframes typingDot {
  0%, 80%, 100% { transform: scale(0.7); opacity: 0.35; }
  40%           { transform: scale(1);   opacity: 1; }
}
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div id="header">
    <div class="circle-lg"></div>
    <div class="circle-sm"></div>
    <div id="header-inner">
      <div id="header-left">
        <img src="logo-bblthk.svg" alt="de bblthk" height="34">
        <div id="header-divider"></div>
        <div>
          <div id="header-title">catalogus-assistent</div>
          <div id="header-subtitle">stel een vraag over de collectie in Wageningen</div>
        </div>
      </div>
      <div id="header-badge">bieb</div>
    </div>
  </div>

  <!-- STATS -->
  <div id="stats">
    <div id="stats-inner">
      <div id="stats-label"></div>
      <div id="stats-themes"></div>
    </div>
  </div>

  <!-- CHAT -->
  <div id="chat">
    <div id="chat-inner">
      <!-- messages injected here -->
      <div id="typing" class="msg-wrap">
        <div class="msg-card">
          <div class="typing-dots">
            <span></span><span></span><span></span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <div id="footer">
    <div id="footer-inner">
      <div id="input-row">
        <div id="input-wrap">
          <div id="ghost" aria-hidden="true"></div>
          <input id="question" type="text"
            placeholder="Stel je vraag over de bblthk-collectie…"
            autocomplete="off">
          <span id="tab-hint">TAB ↹</span>
        </div>
        <button id="send">Verstuur</button>
      </div>
      <div id="footer-hint">Enter of klik Verstuur · resultaten uit de bblthk-collectie Wageningen</div>
    </div>
  </div>

</div>
<script>
function esc(t) {
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}

function createMessage(msg) {
  const isUser = msg.role === 'user';

  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap' + (isUser ? ' user' : '');

  const card = document.createElement('div');
  card.className = 'msg-card' + (isUser ? ' user' : '');

  const textEl = document.createElement('div');
  textEl.textContent = msg.text;
  card.appendChild(textEl);

  if (!isUser && msg.sources && msg.sources.length > 0) {
    const sources = document.createElement('div');
    sources.className = 'sources';

    const label = document.createElement('div');
    label.className = 'sources-label';
    label.textContent = 'Gevonden in de catalogus';
    sources.appendChild(label);

    const cards = document.createElement('div');
    cards.className = 'source-cards';

    msg.sources.forEach(s => {
      const sc = document.createElement('div');
      sc.className = 'source-card' + (s.available ? '' : ' unavailable');

      const dot = document.createElement('div');
      dot.className = 'source-dot' + (s.available ? '' : ' unavailable');
      sc.appendChild(dot);

      const info = document.createElement('div');
      const title = document.createElement('div');
      title.className = 'source-title';
      title.textContent = s.title;
      const byline = document.createElement('div');
      byline.className = 'source-byline';
      byline.textContent = (s.author || 'onbekend') + ' · ' + (s.available ? 'beschikbaar' : 'uitgeleend');
      info.appendChild(title);
      info.appendChild(byline);
      sc.appendChild(info);
      cards.appendChild(sc);
    });

    sources.appendChild(cards);
    card.appendChild(sources);
  }

  wrap.appendChild(card);
  return wrap;
}

// ── Titel-autocomplete ─────────────────────────────────────
// Titels uit getoonde bronkaarten worden onthouden; begin je een
// titel te typen, dan verschijnt de rest als ghost-text (Tab = overnemen).
const knownTitles = [];

function cleanTitle(t) {
  // jaartal-suffix eraf voor een natuurlijkere vervolgvraag
  return t.replace(/\s*\(\[?\s*\w*\s*\d{4}\]?\)\s*$/, '').trim();
}

function rememberTitles(sources) {
  (sources || []).forEach(s => {
    const t = cleanTitle(s.title);
    if (t.length > 3 && !knownTitles.includes(t)) knownTitles.push(t);
  });
}

let activeSuggestion = null; // {completion: string}

function findSuggestion(text) {
  if (!text) return null;
  // probeer steeds kortere suffixen van de invoer (vanaf elk woordbegin)
  const starts = [0];
  for (let i = 0; i < text.length - 1; i++) {
    if (/[\s'"‘“(]/.test(text[i])) starts.push(i + 1);
  }
  for (const s of starts) {
    const frag = text.slice(s);
    if (frag.length < 3) continue;
    const fragLow = frag.toLowerCase();
    for (const title of knownTitles) {
      if (title.toLowerCase().startsWith(fragLow) && title.length > frag.length) {
        return { completion: title.slice(frag.length) };
      }
    }
  }
  return null;
}

function updateGhost() {
  const input = document.getElementById('question');
  const ghost = document.getElementById('ghost');
  const hint  = document.getElementById('tab-hint');
  activeSuggestion = findSuggestion(input.value);
  if (activeSuggestion) {
    ghost.innerHTML = '';
    const typed = document.createElement('span');
    typed.className = 'typed';
    typed.textContent = input.value;
    const comp = document.createElement('span');
    comp.className = 'completion';
    comp.textContent = activeSuggestion.completion;
    ghost.appendChild(typed);
    ghost.appendChild(comp);
    hint.classList.add('visible');
  } else {
    ghost.innerHTML = '';
    hint.classList.remove('visible');
  }
}

function acceptSuggestion() {
  if (!activeSuggestion) return false;
  const input = document.getElementById('question');
  input.value += activeSuggestion.completion;
  activeSuggestion = null;
  updateGhost();
  return true;
}

function addMessage(msg) {
  const chatInner = document.getElementById('chat-inner');
  const typing    = document.getElementById('typing');
  const el        = createMessage(msg);
  chatInner.insertBefore(el, typing);
  if (msg.sources) rememberTitles(msg.sources);
  scroll();
}

function scroll() {
  const chat = document.getElementById('chat');
  chat.scrollTop = chat.scrollHeight;
}

function setLoading(on) {
  document.getElementById('typing').className = 'msg-wrap' + (on ? ' visible' : '');
  document.getElementById('send').disabled = on;
  scroll();
}

async function sendMessage() {
  const input = document.getElementById('question');
  const q = input.value.trim();
  if (!q || document.getElementById('send').disabled) return;

  addMessage({ role: 'user', text: q });
  input.value = '';
  updateGhost();
  setLoading(true);

  try {
    const res  = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q })
    });
    const data = await res.json();
    addMessage({ role: 'assistant', text: data.answer || 'Geen antwoord ontvangen.', sources: data.sources || [] });
  } catch (e) {
    addMessage({ role: 'assistant', text: 'Sorry, ik kan de catalogus nu niet bereiken.\n\nIs de server actief? Start hem met:\npython3 chat_server.py', sources: [] });
  }
  setLoading(false);
}

// Init
document.getElementById('question').addEventListener('keydown', e => {
  if (e.key === 'Tab' && activeSuggestion) { e.preventDefault(); acceptSuggestion(); return; }
  if (e.key === 'Escape') { activeSuggestion = null; document.getElementById('ghost').innerHTML = ''; document.getElementById('tab-hint').classList.remove('visible'); return; }
  if (e.key === 'Enter') sendMessage();
});
document.getElementById('question').addEventListener('input', updateGhost);
document.getElementById('send').addEventListener('click', sendMessage);

addMessage({
  role: 'assistant',
  text: 'Hallo! Ik ben de bblthk catalogus-assistent.\n\nStel me een vraag over onze collectie — ik zoek voor je in de bibliotheek Wageningen en geef persoonlijk advies.',
  sources: []
});

// Demo-statistieken: aantal titels + themaverdeling
fetch('/api/stats')
  .then(r => r.ok ? r.json() : Promise.reject())
  .then(data => {
    const label = document.getElementById('stats-label');
    label.innerHTML = 'Demo-database: <strong>' + data.total + ' titels</strong> uit de bblthk-collectie, verdeeld over ' + data.themes.length + ' thema’s';
    const themesEl = document.getElementById('stats-themes');
    data.themes.forEach(t => {
      const pill = document.createElement('span');
      pill.className = 'theme-pill';
      const name = document.createElement('span');
      name.textContent = t.theme;
      const count = document.createElement('span');
      count.className = 'count';
      count.textContent = t.count;
      pill.appendChild(name);
      pill.appendChild(count);
      themesEl.appendChild(pill);
    });
    document.getElementById('stats').classList.add('visible');
  })
  .catch(() => {}); // geen stats-endpoint (bijv. oudere server): strook blijft verborgen
</script>
</body>
</html>
